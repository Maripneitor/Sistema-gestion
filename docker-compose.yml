version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: sistema_gestion_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: sistema_gestion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Backend Service (Descomentar para integrar completamente)
