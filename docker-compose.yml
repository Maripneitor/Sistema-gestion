# docker-compose.yml (Hybrid: Postgres + Backend ARRIBA)

services:
  # Base de Datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: nexus_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: sistema_gestion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sistema_gestion"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # Backend (Express + Prisma)
  api:
    build: ./backend
    container_name: nexus_api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:password123@postgres:5432/sistema_gestion
      - JWT_SECRET=super-secret-key-premium
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    # Ejecutamos migraciones y seed antes de iniciar el servidor dev
    command: >
      sh -c "pnpm prisma migrate dev --name init && 
             pnpm prisma db seed && 
             pnpm dev"
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: on-failure

  # Frontend (React + Vite) - DESACTIVADO AQUÍ PARA DESARROLLO LOCAL
  # frontend:
  #   build: ./frontend
  #   container_name: nexus_frontend
  #   ports:
  #     - "5173:5173"
