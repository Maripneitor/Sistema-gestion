<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#d1dce2",
              "primary-container": "#dae2ff",
              "surface": "#f8f9fb",
              "tertiary-fixed": "#e3dbfd",
              "surface-container-highest": "#dbe4ea",
              "on-secondary-fixed": "#30405b",
              "inverse-primary": "#5c8bff",
              "on-primary": "#f8f7ff",
              "inverse-on-surface": "#9b9d9f",
              "tertiary-container": "#e3dbfd",
              "tertiary-fixed-dim": "#d5cdee",
              "surface-container-low": "#f1f4f7",
              "tertiary": "#615b77",
              "on-tertiary-fixed-variant": "#5c5672",
              "secondary": "#4f607c",
              "on-primary-fixed-variant": "#0253cd",
              "on-tertiary-fixed": "#3f3a54",
              "on-tertiary-container": "#524c68",
              "on-primary-fixed": "#003993",
              "primary-dim": "#004aba",
              "surface-variant": "#dbe4ea",
              "on-primary-container": "#004ab9",
              "secondary-fixed-dim": "#c4d5f7",
              "secondary-container": "#d6e3ff",
              "error": "#9f403d",
              "secondary-dim": "#445470",
              "surface-bright": "#f8f9fb",
              "on-surface": "#2b3438",
              "surface-container": "#eaeef2",
              "error-container": "#fe8983",
              "on-tertiary": "#fcf7ff",
              "on-surface-variant": "#586065",
              "primary-fixed": "#dae2ff",
              "primary": "#0c56d0",
              "outline-variant": "#aab3b9",
              "on-background": "#2b3438",
              "error-dim": "#4e0309",
              "secondary-fixed": "#d6e3ff",
              "surface-tint": "#0c56d0",
              "background": "#f8f9fb",
              "on-error-container": "#752121",
              "surface-container-high": "#e2e9ee",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed-variant": "#4c5c78",
              "on-secondary-container": "#42526e",
              "tertiary-dim": "#554f6b",
              "on-error": "#fff7f6",
              "on-secondary": "#f8f8ff",
              "primary-fixed-dim": "#c6d3ff",
              "inverse-surface": "#0c0f10",
              "outline": "#737c81"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .editorial-gradient {
            background: linear-gradient(135deg, #0c56d0 0%, #004aba 100%);
        }
        .bg-mesh {
            background-color: #f8f9fb;
            background-image: radial-gradient(at 0% 0%, #dae2ff 0, transparent 50%), 
                              radial-gradient(at 100% 0%, #e3dbfd 0, transparent 50%);
        }
    </style>
</head>
<body class="bg-mesh font-body text-on-surface min-h-screen flex flex-col">
<!-- TopNavBar suppressed per "Destination Rule" (Transactional page) -->
<main class="flex-grow flex items-center justify-center px-6 py-12">
<div class="relative w-full max-w-md">
<!-- Asymmetric Accents (The Digital Curator Persona) -->
<div class="absolute -top-6 -left-6 w-24 h-24 bg-primary-container rounded-xl -z-10 opacity-50"></div>
<div class="absolute -bottom-8 -right-8 w-32 h-32 bg-tertiary-container rounded-full -z-10 opacity-30"></div>
<!-- Main Login Card -->
<section class="bg-surface-container-lowest p-10 rounded-xl shadow-2xl shadow-on-background/5 border border-outline-variant/10 backdrop-blur-sm bg-opacity-95">
<!-- Brand Anchor -->
<div class="mb-10 text-center">
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-2">
                        Nexus Admin
                    </h1>
<p class="font-label text-sm uppercase tracking-widest text-on-surface-variant font-medium">
                        Administrative Authority
                    </p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-medium text-on-surface-variant tracking-wide" for="email">
                            Email address
                        </label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-3 px-0 text-on-surface focus:ring-0 focus:border-primary transition-colors placeholder:text-outline-variant/50" id="email" name="email" placeholder="name@authority.nexus" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="block font-label text-sm font-medium text-on-surface-variant tracking-wide" for="password">
                                Password
                            </label>
<a class="text-xs font-semibold text-primary hover:text-primary-dim transition-colors" href="#">
                                Forgot Password?
                            </a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-3 px-0 text-on-surface focus:ring-0 focus:border-primary transition-colors" id="password" name="password" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary-fixed transition-all" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-3 block font-body text-sm text-on-secondary-fixed-variant" for="remember-me">
                            Remember this device
                        </label>
</div>
<!-- Sign In Button -->
<button class="editorial-gradient w-full py-4 px-6 rounded-md text-on-primary font-headline font-bold text-lg shadow-lg shadow-primary/20 hover:shadow-primary/40 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Additional Context -->
<div class="mt-10 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-sm text-on-surface-variant font-medium">
                        New to the curator platform? 
                        <a class="text-primary hover:underline font-bold ml-1" href="#">Request Access</a>
</p>
</div>
</section>
<!-- Status Decoration -->
<div class="mt-8 flex justify-center gap-4">
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container-high rounded-full">
<span class="w-2 h-2 rounded-full bg-primary-fixed"></span>
<span class="text-[10px] font-bold uppercase tracking-tighter text-on-secondary-fixed-variant">System Status: Optimal</span>
</div>
</div>
</div>
</main>
<!-- Footer Component from Shared JSON -->
<footer class="flex flex-col md:flex-row justify-between items-center px-12 py-6 w-full bg-slate-50 dark:bg-slate-950 opacity-80 hover:opacity-100 transition-opacity">
<div class="mb-4 md:mb-0">
<span class="text-sm font-medium Inter text-slate-500">© 2024 Nexus Admin Authority</span>
</div>
<div class="flex space-x-8">
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-700 dark:hover:text-blue-400 text-sm font-medium Inter" href="#">Privacy Policy</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-700 dark:hover:text-blue-400 text-sm font-medium Inter" href="#">Terms of Service</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-700 dark:hover:text-blue-400 text-sm font-medium Inter" href="#">Security</a>
</div>
</footer>
</body></html>
